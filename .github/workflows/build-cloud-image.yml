name: Build Debian Cloud Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        version:
          - stable
          - oldstable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils libguestfs-tools wget

      - name: Download Debian Cloud Image with cache and sha512
        run: |
          if [ "${{ matrix.version }}" = "stable" ]; then
            IMAGE_URL="https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2"
            IMAGE_NAME="debian-13-genericcloud-amd64.qcow2"
            IMAGE_SHA512="$(wget -qO- https://cloud.debian.org/images/cloud/trixie/latest/SHA512SUMS | grep "$IMAGE_NAME" | awk '{print $1}')"
            BUILD_TIME=$(date +%Y%m%d%H%M)
            RELEASE_NAME="debian-13-zstack-sunoaki+${BUILD_TIME}.qcow2"
          else
            IMAGE_URL="https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
            IMAGE_NAME="debian-12-genericcloud-amd64.qcow2"
            IMAGE_SHA512="$(wget -qO- https://cloud.debian.org/images/cloud/bookworm/latest/SHA512SUMS | grep "$IMAGE_NAME" | awk '{print $1}')"
            BUILD_TIME=$(date +%Y%m%d%H%M)
            RELEASE_NAME="debian-12-zstack-sunoaki+${BUILD_TIME}.qcow2"
          fi

          USE_CACHE=false
          if [ -f /tmp/$IMAGE_NAME ]; then
            echo "Found cached image in /tmp/$IMAGE_NAME, checking sha512..."
            CACHE_SHA512=$(sha512sum /tmp/$IMAGE_NAME | awk '{print $1}')
            if [ "$CACHE_SHA512" = "$IMAGE_SHA512" ]; then
              echo "Cache valid, using cached image."
              sudo cp /tmp/$IMAGE_NAME ./
              USE_CACHE=true
            else
              echo "Cache invalid, will re-download."
            fi
          fi

          if [ "$USE_CACHE" != "true" ]; then
            echo "Downloading image..."
            wget "$IMAGE_URL" -O "$IMAGE_NAME"
            DL_SHA512=$(sha512sum "$IMAGE_NAME" | awk '{print $1}')
            if [ "$DL_SHA512" != "$IMAGE_SHA512" ]; then
              echo "Downloaded image sha512 mismatch!" >&2
              exit 1
            fi
            sudo cp "$IMAGE_NAME" /tmp/
          fi
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

      - name: Upload zs-guest-tools
        run: |
          sudo cp zs-guest-tools.tar.gz /tmp/zs-guest-tools.tar.gz

      - name: Prepare install script (normalize & inspect)
        run: |
          sed -i 's/\r$//' scripts/install-zs-guest-tools.sh || true
          ls -l scripts/install-zs-guest-tools.sh || true
          head -n 40 scripts/install-zs-guest-tools.sh || true

      - name: Customize Image
        run: |
          PACKAGES="qemu-guest-agent,spice-vdagent,aria2,net-tools,iputils-ping,iputils-arping,iputils-tracepath,mtr-tiny,dnsutils,sudo,bash-completion,unzip,wget,curl,nano,most,screen,less,vim,bzip2,lldpd,htop,zstd"
            sudo virt-customize -a "$IMAGE_NAME" \
            --smp 2 --verbose \
            --timezone "Asia/Hong_Kong" \
            --append-line "/etc/default/grub:# disables OS prober to avoid loopback detection which breaks booting" \
            --append-line "/etc/default/grub:GRUB_DISABLE_OS_PROBER=true" \
            --run-command "update-grub" \
            --run-command "systemctl enable serial-getty@ttyS1.service" \
            --mkdir /tmp/zs-guest-tools \
            --upload /tmp/zs-guest-tools.tar.gz:/tmp/zs-guest-tools.tar.gz \
            --run-command "tar -tzf /tmp/zs-guest-tools.tar.gz | head -n 20" \
            --run-command "tar -xzf /tmp/zs-guest-tools.tar.gz -C /tmp/zs-guest-tools" \
            --run-command "ls -l /tmp/zs-guest-tools || true" \
            --run-command 'if [ -f /tmp/zs-guest-tools/install-zs-guest-tools.sh ]; then chmod +x /tmp/zs-guest-tools/install-zs-guest-tools.sh && /tmp/zs-guest-tools/install-zs-guest-tools.sh; else echo "install script not found in archive" >&2; fi' \
            --update \
            --install "$PACKAGES" \
            --run-command "apt-get -y autoremove --purge && apt-get -y clean" \
            --append-line "/etc/systemd/timesyncd.conf:NTP=time.apple.com time.windows.com" \
            --delete "/var/log/*.log" \
            --delete "/var/lib/apt/lists/*" \
            --delete "/var/cache/apt/*" \
            --delete "/tmp/*" \
            --truncate "/etc/machine-id"

      - name: Upload Image to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_NAME }}
          name: ${{ env.RELEASE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
